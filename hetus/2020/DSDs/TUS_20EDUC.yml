    name:
      en: International Standard Classification of Education (ISCED 2011)
      de: Internationale Standardklassifikation des Bildungswesens (ISCED 2011)
      fr: Classification Internationale Type de l'Education (CITE 2011)
    description:
      en: 'ISCED is the reference classification for organizing education programmes and related qualifications by education levels and fields. ISCED classifies education programmes by their content using two main cross-classification variables: levels of education and fields of education. ISCED 2011 presents a revision of the ISCED 1997 levels of education classification. It also introduces a related classification of educational attainment levels based on recognised educational qualifications. ISCED 2011 has nine education levels, from level 0 to level 8 (tertiary education is more detailed).'
