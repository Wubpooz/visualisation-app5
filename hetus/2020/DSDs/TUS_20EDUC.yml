  name:
    fr: Temps passé dans l'activité principale par sexe et et le niveau d'éducation atteint
    de: Zeitverwendung für die Hauptaktivität nach Geschlecht und Bildungsabschluss
    en: Time spent in the main activity by sex and educational attainment level
  description:
    fr: '<p> Le tableau fournit des informations sur les activités principales des individus au cours des 24 heures, en utilisant trois unités de mesure :</p><ul><li> Temps passé : le temps moyen consacré aux activités par l''ensemble des individus ;</li><li> Temps de participation : le temps moyen passé dans les activités par les individus qui y ont participé ;</li><li> Taux de participation : la proportion d''individus ayant consacré du temps aux activités.</li></ul><p> Le niveau d''éducation atteint et le sexe peuvent être utilisés comme critères de ventilation. Les données ont été collectées entre 2020 et 2026. </p>'
    de: '<p> Die Tabelle bietet Informationen über die Hauptaktivitäten, die Personen innerhalb von 24 Stunden ausüben, unter Verwendung von drei Maßeinheiten: </p><ul><li> Aufgewendete Zeit: durchschnittliche Zeit, die alle Personen mit den Aktivitäten verbringen; </li><li> Teilnahmedauer: durchschnittliche Zeit, die jene Personen mit den Aktivitäten verbringen, die an der Aktivität teilgenommen haben; </li><li> Teilnahmequote: der Anteil der Personen, die einige Zeit mit den Aktivitäten verbracht haben. </li></ul><p> Bildungsabschluss und Geschlecht können als Untergliederungen verwendet werden. Die Daten wurden zwischen 2020 und 2026 gesammelt. </p>'
    en: '<p>The table provides information on the main activities individuals do during the 24 hours using three units of measure: </p><ul><li>Time spent: mean time spent on the activities by all individuals;</li><li>Participation time: mean time spent in the activities by those individuals who took part in the activity;</li><li>Participation rate: the proportion of the individuals that spent some time doing the activities.</li></ul><p>The educational attainment level and sex can be used as breakdowns. Data have been collected between 2020 and 2026. </p>'
  annotations:
