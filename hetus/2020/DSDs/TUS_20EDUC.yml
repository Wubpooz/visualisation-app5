    version: '25.2'
    urn: urn:sdmx:org.sdmx.infomodel.codelist.Codelist=ESTAT:GEO(25.2)
    name:
      en: Geopolitical entity (reporting)
      de: Geopolitische Meldeeinheit
      fr: Entité géopolitique (déclarante)
    description:
      en: This code list defines the reporting geopolitical entities.
    annotations:
      LAST_UPDATED:
      - title: 2025-09-17T23:00:00+0200
      IS_STANDARD_CODE_LIST:
      - title: C
        text:
          en: Combined code list, contains standard codes and codes not associated with the concept of the code list
      ARTEFACT_SOURCE:
      - text:
          en: Eurostat Standard Code Lists
      EXPLAN_LABEL:
      - text:
          en: 'The geographical standard code list provides codes on geographical entities at the level of aggregates, countries, regions and organizations; the labels are available in EN, DE and FR and they are in line with the EU Interinstitutional Style Guide. The work is based on various international sources: Interinstitutional Style Guide, ISO 3166 country codes (3166-1 alpha-2), UN standard country and area codes classification. The structure follows the UN standard country or area code classification (M49) and adopts in most of the cases the proposed geographical order. In case of conflict, the most appropriate solution in the interest of the ESS has been chosen. The country codes correspond to the ISO 3166 classification with the exception of: United Kingdom where the code UK was adopted (instead of GB) and Greece where the code EL was adopted (instead of GR) in order to comply with the Interinstitutional Style Guide. The presentation of the code list has been enhanced with additional
            information on the composition of the aggregates and on the dependency status of various geographical entities (mainly overseas territories). ISO 3166-1-alpha-2 - ISO 3166 International Standard for country codes; NUTS'
      DERIVED:
      - title: N
        text:
          en: Not derived
